name: ci
on: [push, pull_request, workflow_dispatch]

jobs:
  test:
    name: tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install pinned environment
        run: pip install -r requirements.lock.txt
      - name: Reproducibility test suite
        run: python tests/run_tests.py

  docker:
    name: docker build (runs tests on build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t nymtc-spf-repro .

  lint:
    name: lint (ruff, informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff
      - run: ruff check src tests run_all.py || true
